<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CraftWorld - Willkommen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon-Link -->
    <link rel="icon" href="https://i.imgur.com/wMGF4Bz.png" type="image/png">

    <!-- Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <!-- Google Fonts -->
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@1;700&display=swap');
    
  
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Silkscreen', monospace;
            background-color: #282828;
            color: #ffffff;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        #physics-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
        }

        #welcome-heading {
            position: absolute; /* Position wird durch JS aktualisiert */
            font-size: 3rem;
            color: #7cc576;
            text-shadow: 3px 3px 0 #000;
            z-index: 1; /* Stellt sicher, dass der Titel über den Blöcken im physics-container liegt */
            text-align: center;
            /* Wichtig: pointer-events none, damit Klicks für Block-Spawnen durchgehen, falls Titel darüber */
            pointer-events: none;
        }

        /* Block-Textur für die Physik-Elemente */
        .block {
            background-size: cover;
            border: 2px solid rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        /* Original Blöcke */
     .dirt {
    background-image: url('https://i.imgur.com/3zw7pG2.png');
    background-size: cover;
        }

        .stone {
    background-image: url(https://i.imgur.com/Lwzi1nS.png);
    background-size: cover; /* Sorgt dafür, dass das Bild den gesamten Block ausfüllt */
        }

        .wood {
    background-image: url(https://i.imgur.com/TpBz6GI.png);
    background-size: cover;
        }

        .gold {
    background-image: url(https://i.imgur.com/0fPTY6x.png);
    background-size: cover;
        }

        .diamond {
    background-image: url(https://i.imgur.com/HLhIIw4.png);
    background-size: cover;
        }

        /* Neue Minecraft-Blöcke */
        .grass {
    background-image: url(https://i.imgur.com/MI3nSUz.png);
    background-size: cover;
        }

        .sand {
    background-image: url(https://i.imgur.com/LcHhy1X.png);
    background-size: cover;
        }

        .obsidian {
    background-image: url(https://i.imgur.com/K01bsYg.png);
    background-size: cover;
        }

        .redstone {
    background-image: url(https://i.imgur.com/vXaBuN5.png);
    background-size: cover;
        }

        .emerald {
    background-image: url(https://i.imgur.com/TDJiVxo.png);
    background-size: cover;
        }

        .netherrack {
    background-image: url(https://i.imgur.com/SUNoGPt.png);
    background-size: cover;
        }

        .glowstone {
    background-image: url(https://i.imgur.com/VeOqIh8.png);
    background-size: cover;
        }

        .ice {
    background-image: url(https://i.imgur.com/7dTZqhJ.png);
    background-size: cover;
        }

        .tnt {
    background-image: url(https://i.imgur.com/R2a8IEB.png);
    background-size: cover;
        }

        .bedrock {
    background-image: url(https://i.imgur.com/2L83p9E.png);
    background-size: cover;
        }

        .leaves {
    background-image: url(https://i.imgur.com/6ZKXBvf.png);
    background-size: cover;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
        }

        .control-button {
            font-family: 'VT323', monospace;
            background-color: #7cc576;
            color: #000;
            border: none;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .control-button:hover {
            background-color: #5ea954;
        }

        @media screen and (max-width: 768px) {
            #welcome-heading {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="physics-container"></div>

    <h1 id="welcome-heading"><p>Willkommen auf ELRA</p></h1>

    <div id="controls">
        <button id="spawn-toggle" class="control-button">Block-Spawnen: AUS</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const Engine = Matter.Engine,
                  Render = Matter.Render,
                  World = Matter.World,
                  Bodies = Matter.Bodies,
                  Body = Matter.Body,
                  Events = Matter.Events,
                  Mouse = Matter.Mouse,
                  MouseConstraint = Matter.MouseConstraint;

            const engine = Engine.create();
            const world = engine.world;
            engine.world.gravity.y = 0.5; // Gravitation nach unten

            const container = document.getElementById('physics-container');

            // Titel Element und Physik-Körper
            const welcomeHeadingElement = document.getElementById('welcome-heading');
            let titleBody;

            welcomeHeadingElement.style.top = '50%';
            welcomeHeadingElement.style.left = '50%';
            welcomeHeadingElement.style.transform = 'translate(-50%, -50%)';

            const titleRect = welcomeHeadingElement.getBoundingClientRect();
            const initialTitleX = titleRect.left + titleRect.width / 2;
            const initialTitleY = titleRect.top + titleRect.height / 2;

            titleBody = Bodies.rectangle(
                initialTitleX,
                initialTitleY,
                titleRect.width,
                titleRect.height,
                {
                    isStatic: false,
                    restitution: 0.2,
                    friction: 0.7,
                    density: 0.5, // *** NEU: Dichte des Titels deutlich erhöht ***
                    render: { visible: false }
                }
            );
            World.add(world, titleBody);


            const ground = Bodies.rectangle(
                window.innerWidth / 2, window.innerHeight + 50,
                window.innerWidth, 100,
                { isStatic: true, render: { visible: false } }
            );
            const leftWall = Bodies.rectangle(
                -50, window.innerHeight / 2,
                100, window.innerHeight,
                { isStatic: true, render: { visible: false } }
            );
            const rightWall = Bodies.rectangle(
                window.innerWidth + 50, window.innerHeight / 2,
                100, window.innerHeight,
                { isStatic: true, render: { visible: false } }
            );
            const ceiling = Bodies.rectangle(
                window.innerWidth / 2, -50,
                window.innerWidth, 100,
                { isStatic: true, render: { visible: false } }
            );
            World.add(world, [ground, leftWall, rightWall, ceiling]);

            const blockTypes = [
                'dirt', 'stone', 'wood', 'gold', 'diamond',
                'grass', 'sand', 'obsidian', 'redstone', 'emerald',
                'netherrack', 'glowstone', 'ice', 'tnt', 'bedrock', 'leaves'
            ];

            let isSpawnEnabled = false;
            let isMouseDown = false;
            let spawnInterval = null;

            const spawnToggleButton = document.getElementById('spawn-toggle');
            spawnToggleButton.addEventListener('click', function() {
                isSpawnEnabled = !isSpawnEnabled;
                spawnToggleButton.textContent = `Block-Spawnen: ${isSpawnEnabled ? 'AN' : 'AUS'}`;
            });

            function getRandomBlockType() {
                return blockTypes[Math.floor(Math.random() * blockTypes.length)];
            }

            function createBlock(x, y, blockType, size = null) {
                if (!size) {
                    size = Math.random() * 20 + 20; // Zufällige Größe zwischen 20px und 40px
                }

                // *** NEU: Dichte basierend auf Größe berechnen ***
                // Kleinere Blöcke (z.B. 20px) sind leichter, größere (z.B. 40px) schwerer.
                // Eine Basisdichte für einen "mittleren" Block (z.B. 30px).
                const baseDensityFactor = 0.0001; // Grundeinheit für Dichte
                const referenceSize = 30; // Referenzgröße für die Basisdichte
                // Lineare Skalierung der Dichte mit der Größe.
                // Man könnte auch quadratisch skalieren (size*size), um Volumen besser zu simulieren,
                // aber für 2D Rechtecke ist eine lineare Skalierung der Dichte mit der Kantenlänge oft ausreichend
                // um den Effekt "größer ist schwerer" zu erzielen.
                // Hier wird die Dichte proportional zum Quadrat der Größe skaliert, was eher einer 3D-Dichte entspricht.
                // Dichte = Masse / Fläche. Wenn Masse ~ Größe^3 und Fläche ~ Größe^2, dann Dichte ~ Größe.
                // Wir wollen Masse proportional zur Fläche * Größe (also Volumen-Äquivalent)
                // Matter.js Masse = Dichte * Fläche.
                // Wenn wir wollen, dass Masse ~ Größe^alpha, dann Dichte * Größe^2 ~ Größe^alpha => Dichte ~ Größe^(alpha-2)
                // Für Masse ~ Größe (kleine Blöcke leichter): alpha = 1 => Dichte ~ Größe^-1
                // Für Masse ~ Größe^2 (Fläche): alpha = 2 => Dichte = konstant (wie bisher)
                // Für Masse ~ Größe^3 (Volumen): alpha = 3 => Dichte ~ Größe
                
                let density;
                // Option 1: Dichte proportional zur Größe (Masse proportional zum Volumen-Äquivalent)
                density = baseDensityFactor * (size / referenceSize) * 10; // *10 um Werte in sinnvollen Bereich zu bringen
                                                                    // 20px Block: 0.0001 * (20/30) * 10 = 0.00066
                                                                    // 40px Block: 0.0001 * (40/30) * 10 = 0.00133

                // Option 2: Dichte so, dass Masse proportional zur Größe (kleinere Blöcke sind absolut leichter)
                // density = (baseDensityFactor * size) / (size * size); // => Dichte = baseDensityFactor / size
                // if (size > 0) { // Schutz vor Division durch 0
                //     density = (baseDensityFactor * 500) / size; // *500 ist ein Skalierungsfaktor
                                                                // 20px Block: 0.0001 * 500 / 20 = 0.05 / 20 = 0.0025
                                                                // 40px Block: 0.0001 * 500 / 40 = 0.05 / 40 = 0.00125
                                                                // Dies macht kleinere Blöcke dichter, was nicht das Ziel ist.

                // Korrekter Ansatz für Masse proportional zur Fläche (Größe^2) mit Dichte abhängig von Größe (also Masse ~ Dichte * Größe^2)
                // Wenn wir wollen, dass leichtere Blöcke eine kleinere Dichte haben:
                // Kleine Blöcke (z.B. 20px) sollen Dichte X haben, große (z.B. 40px) Dichte Y, mit X < Y.
                // Einfachste Methode: Dichte = Skalierungsfaktor * Größe
                const minSize = 20;
                const maxSize = 40;
                const minDensity = 0.000003; // Dichte für den kleinsten Block
                const maxDensity =  0.1;  // Dichte für den größten Block

                if (maxSize === minSize) { // Vermeide Division durch Null, falls alle Blöcke gleich groß
                    density = minDensity;
                } else {
                    // Lineare Interpolation der Dichte basierend auf der Größe
                    density = minDensity + (maxDensity - minDensity) * (size - minSize) / (maxSize - minSize);
                }


                const block = Bodies.rectangle(
                    x, y, size, size,
                    {
                        restitution: 0.3,
                        friction: 0.6,
                        density: density, // *** NEU: Angepasste Dichte hier setzen ***
                        render: { fillStyle: 'transparent', strokeStyle: 'transparent', lineWidth: 0 },
                        blockType: blockType
                    }
                );

                const blockElement = document.createElement('div');
                blockElement.className = `block ${blockType}`;
                blockElement.style.width = `${size}px`;
                blockElement.style.height = `${size}px`;
                blockElement.style.position = 'absolute';
                blockElement.style.pointerEvents = 'none';
                container.appendChild(blockElement);
                block.element = blockElement;

                Body.setAngle(block, Math.random() * Math.PI * 2);
                return block;
            }

            function createRandomBlock(x, y) {
                return createBlock(x, y, getRandomBlockType());
            }

            const blocks = [];
            const numberOfBlocks = 300;
            for (let i = 0; i < numberOfBlocks; i++) {
                const x = Math.random() * window.innerWidth;
                const y = -10 - Math.random() * 40;
                blocks.push(createRandomBlock(x, y));
            }
            World.add(world, blocks);

            const mouse = Mouse.create(container);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { stiffness: 0.2, render: { visible: false } }
            });

            function spawnBlockAtMouse(mousePosition) {
                if (isSpawnEnabled) {
                    const blockType = getRandomBlockType();
                    const size = Math.random() * 15 + 25; // Größe zwischen 25px und 40px für gespawnte Blöcke
                    const newBlock = createBlock(mousePosition.x, mousePosition.y, blockType, size);
                    blocks.push(newBlock);
                    World.add(world, newBlock);
                }
            }

            Events.on(mouseConstraint, 'mousedown', function(event) {
                isMouseDown = true;
                if (isSpawnEnabled) {
                    spawnBlockAtMouse(event.mouse.position);
                    spawnInterval = setInterval(function() {
                        if (isMouseDown && isSpawnEnabled) {
                            spawnBlockAtMouse(mouse.position);
                        }
                    }, 100);
                }
            });

            Events.on(mouseConstraint, 'mouseup', function() {
                isMouseDown = false;
                if (spawnInterval) {
                    clearInterval(spawnInterval);
                    spawnInterval = null;
                }
            });

            World.add(world, mouseConstraint);

            Events.on(engine, 'afterUpdate', function() {
                blocks.forEach(block => {
                    if (block.element) {
                        const pos = block.position;
                        const angle = block.angle;
                        block.element.style.left = `${pos.x - block.element.offsetWidth / 2}px`;
                        block.element.style.top = `${pos.y - block.element.offsetHeight / 2}px`;
                        block.element.style.transform = `rotate(${angle}rad)`;
                    }
                });

                if (titleBody && welcomeHeadingElement) {
                    const pos = titleBody.position;
                    const angle = titleBody.angle;
                    welcomeHeadingElement.style.left = `${pos.x}px`;
                    welcomeHeadingElement.style.top = `${pos.y}px`;
                    welcomeHeadingElement.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
                }

                for (let i = blocks.length - 1; i >= 0; i--) {
                    const block = blocks[i];
                    if (block.position.y > window.innerHeight + 100) {
                        World.remove(world, block);
                        if (block.element) block.element.remove();
                        blocks.splice(i, 1);
                        const x = Math.random() * window.innerWidth;
                        const newBlock = createRandomBlock(x, -10 - Math.random() * 40);
                        blocks.push(newBlock);
                        World.add(world, newBlock);
                    }
                }
            });

            window.addEventListener('resize', function() {
                Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
                Body.setVertices(ground, Matter.Vertices.fromPath(`0 0 ${window.innerWidth} 0 ${window.innerWidth} 100 0 100`));
                Body.setPosition(leftWall, { x: -50, y: window.innerHeight / 2 });
                Body.setVertices(leftWall, Matter.Vertices.fromPath(`0 0 100 0 100 ${window.innerHeight} 0 ${window.innerHeight}`));
                Body.setPosition(rightWall, { x: window.innerWidth + 50, y: window.innerHeight / 2 });
                Body.setVertices(rightWall, Matter.Vertices.fromPath(`0 0 100 0 100 ${window.innerHeight} 0 ${window.innerHeight}`));
                Body.setPosition(ceiling, { x: window.innerWidth / 2, y: -50 });
                Body.setVertices(ceiling, Matter.Vertices.fromPath(`0 0 ${window.innerWidth} 0 ${window.innerWidth} 100 0 100`));
            });

            Engine.run(engine);
        });
    </script>
</body>
</html>
